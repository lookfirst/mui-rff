name: Release

on:
    pull_request_target:
        types:
            - closed
    workflow_dispatch: {}

permissions:
    contents: write
    id-token: write
    pages: write

concurrency:
    group: release-master
    cancel-in-progress: false

jobs:
    release:
        if: >
            github.event_name == 'workflow_dispatch' ||
            (
                github.event.pull_request.merged == true &&
                github.event.pull_request.base.ref == 'master'
            )
        runs-on: ubuntu-latest

        steps:
            - uses: actions/checkout@v6
              with:
                  ref: ${{ github.event.pull_request.merge_commit_sha || github.ref }}

            - name: Setup Bun
              uses: oven-sh/setup-bun@v2

            - name: Use Node.js
              uses: actions/setup-node@v6
              with:
                  node-version: '24'
                  registry-url: 'https://registry.npmjs.org'

            - name: Debug npm and OIDC setup
              shell: bash
              run: |
                  node --version
                  npm --version
                  echo "github.repository=${{ github.repository }}"
                  echo "github.repository_owner=${{ github.repository_owner }}"
                  echo "github.workflow_ref=${{ github.workflow_ref }}"
                  echo "package name: $(node -p "require('./package.json').name")"
                  echo "package version: $(node -p "require('./package.json').version")"
                  echo "NPM_CONFIG_USERCONFIG=$NPM_CONFIG_USERCONFIG"
                  echo "npm registry: $(npm config get registry)"
                  echo "npm whoami: $(npm whoami 2>/dev/null || echo '<not-authenticated>')"
                  echo "OIDC request URL present: ${ACTIONS_ID_TOKEN_REQUEST_URL:+yes}"
                  echo "OIDC request token present: ${ACTIONS_ID_TOKEN_REQUEST_TOKEN:+yes}"
                  echo "NODE_AUTH_TOKEN present: ${NODE_AUTH_TOKEN:+yes}"
                  echo "cwd .npmrc:"
                  if [ -f .npmrc ]; then
                      sed 's#//registry.npmjs.org/:_authToken=.*#//registry.npmjs.org/:_authToken=***MASKED***#' .npmrc
                  else
                      echo "<missing>"
                  fi
                  echo "user .npmrc:"
                  if [ -f "$NPM_CONFIG_USERCONFIG" ]; then
                      sed 's#//registry.npmjs.org/:_authToken=.*#//registry.npmjs.org/:_authToken=***MASKED***#' "$NPM_CONFIG_USERCONFIG"
                  else
                      echo "<missing>"
                  fi
                  echo "npm config list:"
                  npm config list

            - name: Cache Bun dependencies
              uses: actions/cache@v5
              with:
                  path: ~/.bun/install/cache
                  key: ${{ runner.os }}-bun-${{ hashFiles('bun.lock') }}
                  restore-keys: |
                      ${{ runner.os }}-bun-

            - name: Install dependencies
              run: bun install --frozen-lockfile

            - name: Publish package to NPM
              id: publish
              continue-on-error: true
              run: |
                  unset NODE_AUTH_TOKEN
                  npm publish --access public --loglevel verbose

            - name: Dump npm debug logs
              if: steps.publish.outcome == 'failure'
              shell: bash
              run: |
                  if [ -d /home/runner/.npm/_logs ]; then
                      for file in /home/runner/.npm/_logs/*-debug*.log; do
                          if [ -f "$file" ]; then
                              echo "::group::$file"
                              cat "$file"
                              echo "::endgroup::"
                          fi
                      done
                  fi
