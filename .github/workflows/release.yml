name: Release

on:
    workflow_call:
        inputs:
            ref:
                required: false
                type: string
    workflow_dispatch: {}

env:
    FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
    contents: write
    id-token: write
    pages: write

concurrency:
    group: release-master
    cancel-in-progress: false

jobs:
    release:
        runs-on: ubuntu-latest
        environment:
            name: github-pages
            url: ${{ steps.deployment.outputs.page_url }}

        steps:
            - name: Guard against release loop
              shell: bash
              run: |
                  message="${{ github.event.head_commit.message || '' }}"
                  if echo "$message" | grep -qiE '^chore: bump version'; then
                      echo 'Automated version bump commit detected; exiting.'
                      exit 0
                  fi

            - name: Create GitHub App token
              id: app-token
              uses: actions/create-github-app-token@v2
              with:
                  app-id: ${{ vars.RELEASE_APP_ID }}
                  private-key: ${{ secrets.RELEASE_APP_PRIVATE_KEY }}

            - uses: actions/checkout@v6
              with:
                  fetch-depth: 0
                  ref: ${{ inputs.ref || github.ref }}
                  token: ${{ steps.app-token.outputs.token }}
                  persist-credentials: false

            - name: Setup Bun
              uses: oven-sh/setup-bun@v2

            - name: Use Node.js LTS
              uses: actions/setup-node@v6
              with:
                  node-version: 'lts/*'

            - name: Cache Bun dependencies
              uses: actions/cache@v5
              with:
                  path: ~/.bun/install/cache
                  key: ${{ runner.os }}-bun-${{ hashFiles('bun.lock') }}
                  restore-keys: |
                      ${{ runner.os }}-bun-

            - name: Configure Git
              run: |
                  git config user.name '${{ steps.app-token.outputs.app-slug }}[bot]'
                  git config user.email '${{ steps.app-token.outputs.app-slug }}[bot]@users.noreply.github.com'
                  git remote set-url origin "https://x-access-token:${{ steps.app-token.outputs.token }}@github.com/${{ github.repository }}.git"

            - name: Install dependencies
              run: bun install --frozen-lockfile

            - name: Determine version bump
              id: version
              shell: bash
              run: |
                  last_tag="$(git describe --tags --abbrev=0 2>/dev/null || echo '')"
                  if [ -z "$last_tag" ]; then
                      commits="$(git log --pretty=format:%s)"
                  else
                      commits="$(git log "${last_tag}..HEAD" --pretty=format:%s)"
                  fi

                  bump='patch'
                  if echo "$commits" | grep -qiE '^(feat|feature)(\(.*\))?!:|^[a-z]+(\(.*\))?!:|(breaking change|BREAKING CHANGE):'; then
                      bump='major'
                  elif echo "$commits" | grep -qiE '^(feat|feature)(\(.*\))?:'; then
                      bump='minor'
                  fi

                  echo "bump=$bump" >> "$GITHUB_OUTPUT"
                  echo "Detected bump type: $bump"

            - name: Bump version
              id: bump
              shell: bash
              run: |
                  current_version="$(node -p "require('./package.json').version")"
                  bump_type="${{ steps.version.outputs.bump }}"

                  IFS='.' read -r major minor patch <<< "$current_version"

                  case "$bump_type" in
                      major)
                          major=$((major + 1))
                          minor=0
                          patch=0
                          ;;
                      minor)
                          minor=$((minor + 1))
                          patch=0
                          ;;
                      patch)
                          patch=$((patch + 1))
                          ;;
                  esac

                  new_version="$major.$minor.$patch"
                  echo "new_version=$new_version" >> "$GITHUB_OUTPUT"

                  node -e "
                  const fs = require('fs');
                  const pkg = JSON.parse(fs.readFileSync('package.json', 'utf8'));
                  pkg.version = '$new_version';
                  fs.writeFileSync('package.json', JSON.stringify(pkg, null, '\\t') + '\\n');
                  "

            - name: Commit version bump
              env:
                  LEFTHOOK: 0
              run: |
                  git add package.json
                  git commit -m "chore: bump version to ${{ steps.bump.outputs.new_version }} [skip ci]"
                  git tag "v${{ steps.bump.outputs.new_version }}"
                  git push origin HEAD:master
                  git push origin "v${{ steps.bump.outputs.new_version }}"

            - name: Create GitHub release
              env:
                  GH_TOKEN: ${{ steps.app-token.outputs.token }}
              run: |
                  gh release create "v${{ steps.bump.outputs.new_version }}" \
                      --title "v${{ steps.bump.outputs.new_version }}" \
                      --generate-notes

            - name: Build library
              run: bun run build
              env:
                  CI: true

            - name: Build example
              run: bun run build-example

            - name: Setup Pages
              uses: actions/configure-pages@v5

            - name: Upload artifact
              uses: actions/upload-pages-artifact@v4
              with:
                  path: 'example/dist/'

            - name: Deploy to GitHub Pages
              id: deployment
              uses: actions/deploy-pages@v4

            - name: Publish package to NPM
              run: npm publish --access public
